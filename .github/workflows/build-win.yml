name: 构建 Windows 版

on:
  workflow_dispatch:  # 手动触发
  push:
    tags:
      - 'v*'          # 推送 v1.0, v2.0 等标签时自动构建

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install pyinstaller==6.11.0
          pip install -r requirements.txt

      - name: 确认文件版本
        shell: bash
        run: |
          echo "=== 关键文件 ==="
          ls -la app.py config.py
          echo "=== config.py 关键行 ==="
          grep "DIFY_MAIN\|DIFY_REVIEW\|MAX_CONTENT" config.py
          echo "=== 模板改动验证 ==="
          grep -c "影响完整性测试" templates/field-mapper.html && echo "field-mapper OK" || echo "field-mapper NOT FOUND"
          grep -c "跳过，直接进入查询" templates/integrity-test.html && echo "integrity-test OK" || echo "integrity-test NOT FOUND"

      - name: 构建 .exe
        env:
          COMMIT_HASH: ${{ github.sha }}
        run: |
          echo "Build version: $env:COMMIT_HASH"
          pyinstaller `
            --name "DA数据清洗工具" `
            --windowed `
            --add-data "app.py;." `
            --add-data "modules;modules" `
            --add-data "templates;templates" `
            --add-data "static;static" `
            --add-data "config.py;." `
            --hidden-import flask_session `
            --hidden-import duckdb `
            --hidden-import numpy `
            --hidden-import pandas `
            --hidden-import cryptography `
            --collect-all cryptography `
            run.py

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: DA数据清洗工具-Windows
          path: dist/DA数据清洗工具/
